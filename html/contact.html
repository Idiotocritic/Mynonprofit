<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Atrayu Portfolio — Contact</title>
  <link rel="stylesheet" href="css/style1.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
</head>
<body>
  <header>
    <a href="index.html" class="logo">Atrayu Portfolio</a>
    <i class='bx bx-menu' id="menu-icon"></i>
    <nav>
      <a href="index.html" style="--i:1;">Home</a>
      <a href="about.html" style="--i:2;">About</a>
      <a href="works.html" style="--i:3;">Works</a>
      <a href="contact.html" class="active" style="--i:4;">Contact</a>
    </nav>
  </header>

  <div class="bars-animation">
    <div class="bar" style="--i:6;"></div>
    <div class="bar" style="--i:5;"></div>
    <div class="bar" style="--i:4;"></div>
    <div class="bar" style="--i:3;"></div>
    <div class="bar" style="--i:2;"></div>
    <div class="bar" style="--i:1;"></div>
  </div>

  <main>
    <div class="page-banner">
      <img class="banner-img" src="img/aestro.jpg" alt="Contact Image" />
    </div>

    <div class="contact_info" id="contact">
      <h2>Contact Me</h2>
      <p class="desc">If you want to get in touch with me, feel free to reach out to me through my email or other pages.</p>
      <div class="contact-row">
        <div class="contact-dedtail">
          <i class='bx bxl-github'></i>
          <div class="detail">
            <h3>GitHub</h3>
            <p>Visit my GitHub page: <a href="https://github.com/Idiotocritic" target="_blank">Idiotocritic</a></p>
          </div>
        </div>
        <div class="contact-dedtail">
          <i class='bx bxs-paper-plane'></i>
          <div class="detail">
            <h3>Itch.io</h3>
            <p>Itch.io page here: <a href="https://itch.io/profile/idiotcritic" target="_blank">Idiotocritic</a></p>
          </div>
        </div>
        <div class="contact-dedtail">
          <i class='bx bxs-envelope'></i>
          <div class="detail">
            <h3>Email</h3>
            <p><a href="mailto:atrayu.jmorgan@gmail.com">atrayu.jmorgan@gmail.com</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/nav.js"></script>
</body>
</html>
